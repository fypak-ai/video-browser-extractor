[phases.setup]
nixPkgs = ["python311", "ffmpeg", "chromium", "nss", "atk", "at-spi2-atk", "xorg.libX11", "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes", "xorg.libXrandr", "mesa", "libgbm", "alsa-lib"]

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
